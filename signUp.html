<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendify | Sign Up</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --error: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .signup-card {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo h1 {
            font-size: 2rem;
            color: var(--primary);
        }

        .logo span {
            background: var(--primary);
            color: white;
            padding: 5px 12px;
            border-radius: 12px;
            display: inline-block;
            margin-right: 8px;
        }

        h2 {
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }

        input, select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .role-selection {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .role-option {
            flex: 1;
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .role-option:hover {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.05);
        }

        .role-option.selected {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.1);
        }

        .role-icon {
            font-size: 2rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .btn {
            width: 100%;
            padding: 0.875rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .message {
            padding: 0.75rem;
            border-radius: 12px;
            margin-top: 1rem;
            display: none;
            font-size: 0.85rem;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .message.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .message.warning {
            background: #fed7aa;
            color: #92400e;
            border: 1px solid #fed7aa;
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="signup-card">
        <div class="logo">
            <h1><span>A</span> Attendify</h1>
        </div>
        <h2>Create Account</h2>
        <div class="subtitle">Join as Teacher or Event Organizer</div>

        <form id="signupForm">
            <div class="form-group">
                <label>Select Role *</label>
                <div class="role-selection">
                    <div class="role-option" data-role="teacher" onclick="selectRole('teacher')">
                        <span class="role-icon">👨‍🏫</span>
                        <div>Teacher</div>
                    </div>
                    <div class="role-option" data-role="organizer" onclick="selectRole('organizer')">
                        <span class="role-icon">📅</span>
                        <div>Organizer</div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="fullName" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label>Password *</label>
                <input type="password" id="password" placeholder="Create a strong password" required>
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
            </div>

            <div class="form-group">
                <label>Confirm Password *</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
            </div>

            <div id="teacherFields" style="display: none;">
                <div class="form-group">
                    <label>Teacher ID *</label>
                    <input type="text" id="teacherId" placeholder="TCH-2024-001">
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <input type="text" id="department" placeholder="e.g., Computer Science">
                </div>
            </div>

            <div id="organizerFields" style="display: none;">
                <div class="form-group">
                    <label>Organization ID *</label>
                    <input type="text" id="orgId" placeholder="ORG-2024-001">
                </div>
                <div class="form-group">
                    <label>Organization Name</label>
                    <input type="text" id="orgName" placeholder="Your organization name">
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="signupBtn">Create Account</button>
            <div id="message" class="message"></div>
        </form>

        <div class="footer">
            Already have an account? <a href="admin.html">Sign In</a>
        </div>
    </div>

    <script type="module">
        import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

        const supabase = createClient(
            "https://jutdgdrmzuktudxgixqq.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1dGRnZHJtenVrdHVkeGdpeHFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MDk2OTcsImV4cCI6MjA5MTQ4NTY5N30.VLS2G0sAnmp40mbjnr70Pv_v5-9eHSOBSHfl2AtQhYM"
        );

        let selectedRole = null;

        window.selectRole = function(role) {
            selectedRole = role;
            
            document.querySelectorAll('.role-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            document.querySelector(`[data-role="${role}"]`).classList.add('selected');
            
            const teacherFields = document.getElementById('teacherFields');
            const organizerFields = document.getElementById('organizerFields');
            
            if (role === 'teacher') {
                teacherFields.style.display = 'block';
                organizerFields.style.display = 'none';
                document.getElementById('teacherId').required = true;
                document.getElementById('orgId').required = false;
            } else {
                teacherFields.style.display = 'none';
                organizerFields.style.display = 'block';
                document.getElementById('teacherId').required = false;
                document.getElementById('orgId').required = true;
            }
        };

        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');
        const confirmPasswordInput = document.getElementById('confirmPassword');

        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            const percentage = (strength / 5) * 100;
            strengthBar.style.width = percentage + '%';
            
            if (percentage < 20) {
                strengthBar.style.background = '#ef4444';
            } else if (percentage < 60) {
                strengthBar.style.background = '#f59e0b';
            } else {
                strengthBar.style.background = '#10b981';
            }
        });

        const signupForm = document.getElementById('signupForm');
        const signupBtn = document.getElementById('signupBtn');
        const messageDiv = document.getElementById('message');

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            messageDiv.style.display = 'none';
            
            if (!selectedRole) {
                showMessage('Please select a role (Teacher or Organizer)', 'error');
                return;
            }
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            if (!fullName) {
                showMessage('Please enter your full name', 'error');
                return;
            }
            
            if (!email) {
                showMessage('Please enter your email address', 'error');
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters long', 'error');
                return;
            }
            
            let roleData = {};
            if (selectedRole === 'teacher') {
                const teacherId = document.getElementById('teacherId').value.trim();
                if (!teacherId) {
                    showMessage('Please enter your Teacher ID', 'error');
                    return;
                }
                roleData = {
                    teacher_id: teacherId,
                    department: document.getElementById('department').value.trim()
                };
            } else {
                const orgId = document.getElementById('orgId').value.trim();
                if (!orgId) {
                    showMessage('Please enter your Organization ID', 'error');
                    return;
                }
                roleData = {
                    organizer_id: orgId,
                    organization_name: document.getElementById('orgName').value.trim()
                };
            }
            
            signupBtn.disabled = true;
            signupBtn.innerHTML = '<span class="spinner"></span> Creating account...';
            
            try {
                // First check if user already exists
                const { data: existingUser } = await supabase
                    .from('profiles')
                    .select('email')
                    .eq('email', email)
                    .maybeSingle();
                
                if (existingUser) {
                    showMessage('An account with this email already exists. Please login instead.', 'error');
                    signupBtn.disabled = false;
                    signupBtn.innerHTML = 'Create Account';
                    return;
                }
                
                // Attempt signup
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName,
                            role: selectedRole,
                            ...roleData
                        }
                    }
                });
                
                if (authError) {
                    // Handle rate limit error specifically
                    if (authError.message.includes('rate limit') || authError.status === 429) {
                        showMessage('Too many signup attempts. Please wait 5-10 minutes before trying again.', 'warning');
                    } else if (authError.message.includes('User already registered')) {
                        showMessage('An account with this email already exists. Please login instead.', 'error');
                    } else {
                        showMessage(authError.message || 'Failed to create account. Please try again.', 'error');
                    }
                    signupBtn.disabled = false;
                    signupBtn.innerHTML = 'Create Account';
                    return;
                }
                
                if (authData.user) {
                    // Create profile in database
                    const profileData = {
                        id: authData.user.id,
                        email: email,
                        full_name: fullName,
                        role: selectedRole,
                        created_at: new Date().toISOString(),
                        updated_at: new Date().toISOString(),
                        ...roleData
                    };
                    
                    const { error: profileError } = await supabase
                        .from('profiles')
                        .insert([profileData]);
                    
                    if (profileError) {
                        console.error('Profile creation error:', profileError);
                        // Continue anyway - auth is created
                    }
                    
                    showMessage('Account created successfully! Redirecting to login...', 'success');
                    signupBtn.innerHTML = 'Success! Redirecting...';
                    
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 2000);
                }
                
            } catch (error) {
                console.error('Signup error:', error);
                showMessage('An unexpected error occurred. Please try again.', 'error');
                signupBtn.disabled = false;
                signupBtn.innerHTML = 'Create Account';
            }
        });
    </script>
</body>
</html>
