<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendify | Admin Login</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --error: #ef4444;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f0f4f8;
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #e0e7ff 0%, #f8fafc 100%);
        }

        .shape {
            position: absolute;
            z-index: -1;
            filter: blur(60px);
            border-radius: 50%;
            animation: float 20s infinite alternate;
        }
        .shape-1 { width: 400px; height: 400px; background: rgba(79, 70, 229, 0.15); top: -10%; right: -5%; animation-duration: 15s; }
        .shape-2 { width: 350px; height: 350px; background: rgba(16, 185, 129, 0.1); bottom: -10%; left: -5%; animation-duration: 25s; }
        .shape-3 { width: 200px; height: 200px; background: rgba(236, 72, 153, 0.1); top: 40%; left: 15%; animation-duration: 18s; }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(50px, 100px) rotate(15deg); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 3.5rem 2.5rem;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 440px;
            position: relative;
        }

        .animate-in { animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.5rem;
            justify-content: center;
        }
        .brand span {
            background: linear-gradient(135deg, var(--primary), #818cf8);
            color: white;
            padding: 8px 16px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1.4rem;
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
        }
        .brand h1 { font-size: 1.8rem; margin: 0; letter-spacing: -1px; font-weight: 900; }

        h2 { font-size: 1.4rem; margin-bottom: 0.5rem; text-align: center; font-weight: 700; }
        p.subtitle { color: var(--text-muted); font-size: 0.95rem; text-align: center; margin-bottom: 2.5rem; }

        .form-group { margin-bottom: 1.8rem; }
        label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 0.6rem; color: var(--text-main); padding-left: 4px; }
        
        input {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 2px solid var(--border);
            border-radius: 18px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.8);
            outline: none;
        }
        input:focus {
            border-color: var(--primary);
            background: white;
            transform: scale(1.01);
        }

        .btn-login {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            border-radius: 18px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 1rem;
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
        }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }

        .error-msg {
            color: var(--error);
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            margin-top: 1.2rem;
            display: none;
            padding: 10px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 10px;
        }

        .support-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        
        .support-footer a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="bg-canvas"></div>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>

    <div class="login-card animate-in">
        <div class="brand animate-in delay-1">
            <span>A</span>
            <h1>Attendify</h1>
        </div>

        <h2 class="animate-in delay-1">Welcome Back</h2>
        <p class="subtitle animate-in delay-1">Sign in to your account</p>

        <form id="loginForm" class="animate-in delay-2">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="admin@attendify.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">Log in</button>
            <div id="errorMessage" class="error-msg">Invalid email or password.</div>
        </form>

        <div class="support-footer animate-in delay-3">
            <p>Don't have an account? <a href="signUp.html">Create Account</a></p>
            <p style="margin-top: 10px;">Forgot password? <a href="mailto:support@attendify.com">Request Access</a></p>
        </div>
    </div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
        "https://jutdgdrmzuktudxgixqq.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1dGRnZHJtenVrdHVkeGdpeHFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MDk2OTcsImV4cCI6MjA5MTQ4NTY5N30.VLS2G0sAnmp40mbjnr70Pv_v5-9eHSOBSHfl2AtQhYM"
    );

    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const errorDiv = document.getElementById('errorMessage');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="spinner"></span> Authenticating...';
        errorDiv.style.display = "none";

        const { data, error } = await supabase.auth.signInWithPassword({
            email: email,
            password: password
        });

        if (error) {
            loginBtn.disabled = false;
            loginBtn.innerHTML = "Log in";
            errorDiv.innerText = error.message;
            errorDiv.style.display = "block";
            console.error("Login error:", error.message);
        } else {
            loginBtn.innerHTML = "Success! Redirecting...";
            loginBtn.style.background = "#10b981";
            
            setTimeout(() => {
                window.location.href = "admin.html";
            }, 800);
        }
    });
</script>

</body>
</html>
