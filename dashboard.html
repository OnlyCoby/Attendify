<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Attendify | Complete Event Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --ink: #0a0a0f;
  --ink2: #1e1e2e;
  --ink3: #2e2e42;
  --muted: #7070a0;
  --muted2: #a0a0c0;
  --surface: #f5f4ff;
  --surface2: #eeecff;
  --accent: #5c4af6;
  --accent2: #8b7ffe;
  --accent3: #c8c2ff;
  --lime: #b8ff57;
  --rose: #ff4f7b;
  --amber: #ffb23f;
  --cyan: #3dd9d6;
  --white: #ffffff;
  --border: rgba(92,74,246,0.12);
  --border2: rgba(92,74,246,0.22);
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 8px rgba(92,74,246,0.08);
  --shadow-lg: 0 8px 24px rgba(92,74,246,0.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--surface);
  color: var(--ink);
  display: flex;
  min-height: 100vh;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--accent3); border-radius: 4px; }

.sidebar {
  width: 240px;
  min-width: 240px;
  background: var(--ink2);
  display: flex;
  flex-direction: column;
  padding: 20px 16px;
  gap: 4px;
  overflow-y: auto;
  position: relative;
}
.sidebar::after {
  content:'';
  position:absolute;
  top:0; right:0;
  width:1px;
  height:100%;
  background: linear-gradient(to bottom, transparent, var(--accent), transparent);
  opacity:0.2;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-icon {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
}
.nav-section { margin-bottom: 8px; }
.nav-label {
  font-size: 0.6rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  padding: 0 8px;
  margin-bottom: 4px;
  margin-top: 12px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 8px;
  color: var(--muted2);
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: var(--white); }
.nav-item.active {
  background: var(--accent);
  color: var(--white);
  font-weight: 600;
  box-shadow: 0 2px 8px rgba(92,74,246,0.3);
}
.nav-item .nav-icon { font-size: 0.9rem; min-width: 20px; text-align: center; }
.sidebar-footer {
  margin-top: auto;
  padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.user-chip {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.user-chip:hover { background: rgba(255,255,255,0.1); }
.user-av {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}
.user-info { flex: 1; }
.user-name { font-size: 0.8rem; font-weight: 700; color: var(--white); }
.user-email { font-size: 0.65rem; color: var(--muted2); }
.user-role {
  font-size: 0.6rem;
  background: rgba(92,74,246,0.3);
  display: inline-block;
  padding: 2px 6px;
  border-radius: 12px;
  margin-top: 2px;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  max-width: 100%;
}
.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  flex-shrink: 0;
}
.page-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  color: var(--ink);
}
.topbar-right { display: flex; align-items: center; gap: 12px; }
.badge-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--lime);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.datetime-chip {
  font-size: 0.7rem;
  color: var(--muted);
  background: var(--surface);
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
}
.content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  background: var(--surface);
  max-width: 1400px;
  margin: 0 auto;
  width: 100%;
}

.view { display: none; animation: fadeUp 0.2s ease; }
.view.active { display: block; }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 16px 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.card-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--ink);
}
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.three-col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
.stat-card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 12px 16px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s;
}
.stat-card:hover { transform: translateY(-2px); }
.stat-card::before {
  content:'';
  position:absolute;
  top:0; left:0;
  width: 3px;
  height: 100%;
  background: var(--accent);
}
.stat-card.lime::before { background: var(--lime); }
.stat-card.rose::before { background: var(--rose); }
.stat-card.amber::before { background: var(--amber); }
.stat-card.cyan::before { background: var(--cyan); }
.stat-num {
  font-family: 'Syne', sans-serif;
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--ink);
  line-height: 1;
}
.stat-label { font-size: 0.65rem; color: var(--muted); margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-sub { font-size: 0.6rem; color: var(--accent2); margin-top: 2px; }

.form-group { margin-bottom: 12px; }
.form-label {
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
  display: block;
}
input, select, textarea {
  width: 100%;
  padding: 8px 12px;
  border: 1.5px solid var(--border2);
  border-radius: var(--radius-sm);
  font-size: 0.8rem;
  font-family: 'DM Sans', sans-serif;
  background: var(--surface);
  color: var(--ink);
  transition: all 0.2s;
  outline: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); background: var(--white); box-shadow: 0 0 0 2px rgba(92,74,246,0.1); }
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #4936e8; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(92,74,246,0.3); }
.btn-outline { background: transparent; border: 1.5px solid var(--border2); color: var(--ink); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-success { background: #22c55e; color: white; }
.btn-danger { background: var(--rose); color: white; }
.btn-sm { padding: 4px 10px; font-size: 0.7rem; border-radius: 6px; }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

.event-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.event-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  transition: all 0.2s;
  cursor: pointer;
  position: relative;
}
.event-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
  border-color: var(--accent);
}
.event-card-accent {
  position: absolute;
  top: 0; left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: var(--radius) var(--radius) 0 0;
}
.event-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  margin: 6px 0 8px;
}
.event-meta { display: flex; gap: 10px; flex-wrap: wrap; margin: 8px 0; font-size: 0.7rem; color: var(--muted); }
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 0.65rem;
  font-weight: 600;
  background: var(--surface2);
  color: var(--accent);
}
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 0.65rem;
  font-weight: 600;
}
.badge-active { background: #dcfce7; color: #16a34a; }
.badge-upcoming { background: #fef9c3; color: #a16207; }
.badge-ended { background: #fee2e2; color: #dc2626; }

.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
}
.empty-icon { font-size: 2rem; margin-bottom: 8px; opacity: 0.5; }

.modal-bg {
  position: fixed; inset: 0;
  background: rgba(10,10,15,0.6);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--white);
  border-radius: 16px;
  width: min(480px, 90vw);
  max-height: 80vh;
  overflow-y: auto;
}
.modal-head {
  padding: 16px 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-head h3 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
.modal-body { padding: 16px 20px 20px; }
.close-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: none;
  background: var(--surface);
  cursor: pointer;
  font-size: 0.9rem;
}

.notification {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--ink2);
  color: white;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 0.8rem;
  font-weight: 500;
  z-index: 2000;
  animation: slideUp 0.2s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.progress-track {
  background: var(--surface2);
  border-radius: 4px;
  height: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 4px;
  background: var(--lime);
  transition: width 0.3s ease;
}

.table-wrap {
  overflow-x: auto;
}

table {
  border-collapse: collapse;
  width: 100%;
  font-size: 0.75rem;
}

table thead tr {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}

table th {
  padding: 8px 12px;
  text-align: left;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  font-size: 0.65rem;
}

table td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}

table tbody tr:hover {
  background: rgba(92, 74, 246, 0.05);
}

/* AI Chat Box - Enhanced */
.ai-chat-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 56px;
  height: 56px;
  border-radius: 28px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(92,74,246,0.3);
  transition: all 0.3s;
  z-index: 1000;
  color: white;
  font-size: 1.4rem;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ai-chat-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 20px rgba(92,74,246,0.4);
}
.ai-chat-btn.active {
  animation: pulse-btn 0.6s infinite;
}
@keyframes pulse-btn {
  0%, 100% { box-shadow: 0 4px 12px rgba(92,74,246,0.3); }
  50% { box-shadow: 0 6px 20px rgba(92,74,246,0.6); }
}

.ai-chat-window {
  position: fixed;
  bottom: 90px;
  right: 24px;
  width: 420px;
  height: 600px;
  background: var(--white);
  border-radius: 16px;
  box-shadow: var(--shadow-lg);
  display: none;
  flex-direction: column;
  z-index: 1000;
  border: 1px solid var(--border);
  overflow: hidden;
  animation: slideUp 0.3s ease;
}
.ai-chat-window.open {
  display: flex;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.ai-chat-header {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.ai-chat-header h4 {
  font-size: 0.85rem;
  font-weight: 600;
  margin: 0;
}
.ai-chat-close {
  background: none;
  border: none;
  color: white;
  cursor: pointer;
  font-size: 1.2rem;
  padding: 0 4px;
}
.ai-chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.ai-message {
  display: flex;
  gap: 8px;
  animation: fadeInMsg 0.3s ease;
}
.ai-message.user {
  justify-content: flex-end;
}
@keyframes fadeInMsg {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.ai-message.user .message-bubble {
  background: var(--accent);
  color: white;
}
.ai-message.ai .message-bubble {
  background: var(--white);
  border: 1px solid var(--border);
  color: var(--ink);
}
.message-bubble {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 0.8rem;
  line-height: 1.5;
  word-wrap: break-word;
}

.typing-bubble {
  display: flex;
  gap: 4px;
  padding: 10px 14px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: fit-content;
}
.typing-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--muted);
  animation: typing 1.4s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
  0%, 60%, 100% { opacity: 0.4; }
  30% { opacity: 1; }
}

.ai-chat-input-area {
  padding: 12px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  background: var(--white);
}
.ai-chat-input-area input {
  flex: 1;
  margin: 0;
  padding: 8px 12px;
  font-size: 0.8rem;
  border: 1px solid var(--border2);
  border-radius: 8px;
  outline: none;
}
.ai-chat-input-area input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(92,74,246,0.1);
}
.ai-chat-input-area button {
  padding: 8px 12px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 0.8rem;
  font-weight: 600;
}
.ai-chat-input-area button:hover {
  background: #4936e8;
}
.ai-chat-input-area button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

@media (max-width: 768px) {
  .sidebar { display: none; }
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .two-col, .three-col { grid-template-columns: 1fr; }
  .content { padding: 12px; }
  .ai-chat-window { width: 340px; right: 12px; bottom: 80px; height: 500px; }
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo"><div class="logo-icon">A</div>Attendify</div>
  <div class="nav-section">
    <div class="nav-label">Main</div>
    <div class="nav-item active" onclick="window.switchView('dashboard')"><span class="nav-icon">📊</span>Dashboard</div>
    <div class="nav-item" onclick="window.switchView('events')"><span class="nav-icon">📅</span>My Events</div>
    <div class="nav-item" onclick="window.switchView('create')"><span class="nav-icon">➕</span>Create Event</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">Management</div>
    <div class="nav-item" onclick="window.switchView('scan')"><span class="nav-icon">📱</span>Scan Attendance</div>
    <div class="nav-item" onclick="window.switchView('attendees')"><span class="nav-icon">👥</span>Attendees</div>
  </div>
  <div class="sidebar-footer">
    <div class="user-chip" id="profileBtn">
      <div class="user-av" id="userAvatar">AD</div>
      <div class="user-info">
        <div class="user-name" id="userName">Admin User</div>
        <div class="user-email" id="userEmail">admin@attendify.com</div>
        <div class="user-role">Organizer</div>
      </div>
    </div>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="page-title" id="pageTitle">Dashboard</div>
    <div class="topbar-right">
      <span class="badge-dot"></span>
      <span class="datetime-chip" id="clockChip">--:--</span>
      <button class="btn btn-primary btn-sm" onclick="window.switchView('create')">New Event</button>
    </div>
  </header>
  <div class="content">
    <div id="view-dashboard" class="view active">
      <div class="stat-grid" id="statsGrid"></div>
      <div class="two-col">
        <div class="card"><div class="card-title">Recent Events</div><div id="recentEvents"></div></div>
        <div class="card"><div class="card-title">Quick Stats</div><div id="quickStats"></div></div>
      </div>
      <div class="card"><div class="card-title">All Events</div><div id="allEventsList"></div></div>
    </div>

    <div id="view-events" class="view">
      <div class="card"><div class="card-title">My Events</div><div id="myEventsGrid" class="event-grid"></div></div>
    </div>

    <div id="view-create" class="view">
      <div class="card">
        <div class="card-title">Create New Event</div>
        <div class="form-group"><label class="form-label">Event Title *</label><input type="text" id="eventTitle" placeholder="e.g. Annual Tech Conference 2025"></div>
        <div class="form-group"><label class="form-label">Description</label><textarea id="eventDesc" rows="2" placeholder="Event description..."></textarea></div>
        <div class="row-2">
          <div class="form-group"><label class="form-label">Date *</label><input type="date" id="eventDate"></div>
          <div class="form-group"><label class="form-label">Time *</label><input type="time" id="eventTime"></div>
        </div>
        <div class="row-2">
          <div class="form-group"><label class="form-label">End Time</label><input type="time" id="eventEndTime"></div>
          <div class="form-group"><label class="form-label">Location</label><input type="text" id="eventLocation" placeholder="Venue / Room"></div>
        </div>
        <div class="row-2">
          <div class="form-group"><label class="form-label">Event Type</label>
            <select id="eventType"><option>Conference</option><option>Workshop</option><option>Seminar</option><option>Training</option><option>Meeting</option></select>
          </div>
          <div class="form-group"><label class="form-label">Capacity</label><input type="number" id="eventCapacity" placeholder="0 = unlimited" value="0"></div>
        </div>
        <div class="btn-group"><button class="btn btn-primary" id="createEventBtn">Create Event</button><button class="btn btn-outline" onclick="window.clearEventForm()">Clear</button></div>
      </div>
    </div>

    <div id="view-scan" class="view">

    addTypingIndicator();
    
    // Build context
    const eventData = allEvents.map(e => ({
      title: e.title,
      type: e.type,
      date: e.date,
      attendees: allAttendees.filter(a => a.event_id === e.id).length,
      checkins: allAttendees.filter(a => a.event_id === e.id && a.checked_in).length
    }));
    
    // Add to history
    chatHistory.push({ role: 'user', content: message });
    if(chatHistory.length > 10) chatHistory = chatHistory.slice(-10);
    
    const systemPrompt = `You are Attendify's smart AI assistant. You help users manage events and attendance. 
Current data: ${JSON.stringify(eventData)}
Be helpful, concise, and friendly. Provide specific suggestions based on the user's data.`;
    
    try {
      const response = await fetch(DEEPSEEK_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
        },
        body: JSON.stringify({
          model: 'deepseek-chat',
          messages: [
            { role: 'system', content: systemPrompt },
            ...chatHistory
          ],
          temperature: 0.7,
          max_tokens: 500,
          top_p: 0.95
        })
      });
      
      if(!response.ok) throw new Error('API Error');
      
      const data = await response.json();
      const aiResponse = data.choices?.[0]?.message?.content || 'Sorry, I couldn\'t process that. Try asking again!';
      
      chatHistory.push({ role: 'assistant', content: aiResponse });
      if(chatHistory.length > 10) chatHistory = chatHistory.slice(-10);
      
      removeTypingIndicator();
      addAIMessage(aiResponse);
    } catch(error) {
      removeTypingIndicator();
      addAIMessage(`📊 Based on your data: ${allEvents.length} events, ${allAttendees.length} total attendees, ${allAttendees.filter(a => a.checked_in).length} check-ins. Try asking a specific question!`);
    }
  };

  function updateClock() {
    const now = new Date();
    try {
      document.getElementById('clockChip').textContent = now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: true});
    } catch(e) {
      const hours = String(now.getHours()).padStart(2, '0');
      const mins = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clockChip').textContent = hours + ':' + mins;
    }
  }

  window.closeModal = function(e) { if(e.target === document.getElementById('modalBg')) window.closeModalForce(); };
  window.closeModalForce = function() { document.getElementById('modalBg').classList.remove('open'); };

  // Initialize
  loadData();
  setInterval(updateClock, 1000);
  updateClock();
  
  const createBtn = document.getElementById('createEventBtn');
  if(createBtn) {
    createBtn.addEventListener('click', window.createEvent);
  }
})();
</script>
</body>
</html>
